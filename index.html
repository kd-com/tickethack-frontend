<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TICKETHACK - home</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="container">
            <div class="row">
                <div class="logo">
                    <a href="index.html">
                        <h1>Tickethack</h1>
                    </a>
                </div>
                <div class="menu">
                    <nav>
                        <ul>
                            <li><a href="cart.html" class="menu-item" id="menu_cart">Cart</a></li>
                            <li><a href="booking.html" class="menu-item" id="menu_booking">Booking</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div id="home" class="container">
            <div class="content">
                <div class="title">
                    <h2>Explore the world effortlessly by train!</h2>
                    <p>Compare, book and enjoy cheap prices for train tickets: your jouney starts on TicketHack.</p>
                </div>
                <div class="row row-search">
                    <div id="search" class="card">
                        <input id="departure" name="departure" type="text" placeholder="Departure">
                        <input id="arrival" name="arrival" type="text" placeholder="arrival">
                        <input id="calendrier" name="date" type="date">
                        <input type="submit" value="Envoyer le formulaire" />
                    </div>
                    <div id="search-result" class="card">
                        <div id="result-null">
                            <img src="./images/train.png" alt="train">
                            <span class="separator"></span>
                            <p>It's time to book your future trip.</p>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>


    <footer>
        <script src="scripts.js"></script>
</footer>
</body>
</html>
